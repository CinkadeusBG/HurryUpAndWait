<div class="filter-toolbar glass-panel">
  <div class="search-sort-row">
    <p-iconField iconPosition="left" class="search-field">
      <p-inputIcon styleClass="pi pi-search"></p-inputIcon>
      <input
        pInputText
        type="search"
        placeholder="Search rides & shows"
        [ngModel]="search"
        (ngModelChange)="searchChange.emit($event)"
        aria-label="Search attractions"
      />
    </p-iconField>

    <button
      type="button"
      class="sort-toggle"
      [class.is-longest]="sort === 'longest-wait'"
      [attr.aria-label]="sortAriaLabel"
      [title]="sortLabel"
      (click)="toggleWaitSort()"
    >
      <i [class]="sortIcon" aria-hidden="true"></i>
      <span class="sort-toggle-label">{{ sortLabel }}</span>
    </button>
  </div>
</div>
