name: Deploy to GitHub Pages

# Do NOT deploy on every data commit (collector runs every 5 min).
# - push: code changes only (data/** ignored)
# - schedule: refresh site with latest data every 15 minutes
# - workflow_dispatch: manual deploy
on:
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build -- --base-href /${{ github.event.repository.name }}/

      - run: touch dist/orlando-park-pulse/browser/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/orlando-park-pulse/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
