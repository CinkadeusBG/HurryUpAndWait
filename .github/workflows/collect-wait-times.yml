name: Collect Wait Times

# Triggered by external cron (cron-job.org) via workflow_dispatch API every 5 minutes.
# Native GitHub schedule cron is disabled — it never fired for this repo.
# See docs/EXTERNAL_CRON.md. The Python script enforces park hours (8 AM–midnight Eastern).
on:
  workflow_dispatch:
    inputs:
      force:
        description: "Collect even outside operating hours"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: collect-wait-times
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run collector
        run: |
          ARGS="--commit"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          python scripts/collect_wait_times.py $ARGS